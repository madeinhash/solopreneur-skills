AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Full-stack deployment: ECS Fargate (backend + agent) + ALB + RDS PostgreSQL + CodePipeline CI/CD.
  Uses default VPC to save cost. No NAT Gateway.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming
    Default: myproject

  Environment:
    Type: String
    AllowedValues: [production, staging]
    Default: production

  # --- GitHub Source ---
  GitHubOwner:
    Type: String
    Description: GitHub username or org

  BackendRepo:
    Type: String
    Default: backend

  AgentRepo:
    Type: String
    Default: agent

  GitHubBranch:
    Type: String
    Default: main

  GitHubConnectionArn:
    Type: String
    Description: AWS CodeStar Connection ARN for GitHub (create in console first)

  # --- Database ---
  DBUsername:
    Type: String
    Default: postgres

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance size (db.t4g.micro = free tier eligible)

  # --- ECS ---
  BackendCpu:
    Type: String
    Default: '256'

  BackendMemory:
    Type: String
    Default: '512'

  AgentCpu:
    Type: String
    Default: '256'

  AgentMemory:
    Type: String
    Default: '512'

  # --- Secrets ---
  JWTSecret:
    Type: String
    NoEcho: true

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ''

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ''

  LLMModel:
    Type: String
    Default: gpt-4o

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # Security Groups (default VPC)
  # --------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-alb-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-ecs-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-rds-sg'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  # --------------------------------------------------------------------------
  # RDS PostgreSQL
  # --------------------------------------------------------------------------
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${Environment}'
      Engine: postgres
      EngineVersion: '16.4'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: !Sub '${ProjectName}'
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      StorageEncrypted: true

  # --------------------------------------------------------------------------
  # ECR Repositories
  # --------------------------------------------------------------------------
  BackendECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}-backend'
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"selection":{"tagStatus":"untagged","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  AgentECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}-agent'
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"selection":{"tagStatus":"untagged","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  # --------------------------------------------------------------------------
  # ECS Cluster
  # --------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  # --------------------------------------------------------------------------
  # IAM — ECS Task Execution Role
  # --------------------------------------------------------------------------
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ecs-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ecs-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # --------------------------------------------------------------------------
  # CloudWatch Log Groups
  # --------------------------------------------------------------------------
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-backend'
      RetentionInDays: 14

  AgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-agent'
      RetentionInDays: 14

  # --------------------------------------------------------------------------
  # ALB
  # --------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Split
        - ','
        - !ImportValue DefaultVPCSubnets

  # --- Backend Target Group ---
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-backend-tg'
      Port: 4000
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue DefaultVPCId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # --- Agent Target Group ---
  AgentTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-agent-tg'
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue DefaultVPCId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # --- ALB Listener ---
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultAction:
        Type: forward
        TargetGroupArn: !Ref BackendTargetGroup

  # --- Path-based routing: /agent/* → Agent service ---
  AgentListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/agent/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AgentTargetGroup

  # --------------------------------------------------------------------------
  # ECS Task Definitions
  # --------------------------------------------------------------------------
  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-backend'
      Cpu: !Ref BackendCpu
      Memory: !Ref BackendMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-backend:latest'
          PortMappings:
            - ContainerPort: 4000
          Environment:
            - Name: PORT
              Value: '4000'
            - Name: NODE_ENV
              Value: !Ref Environment
            - Name: DB_HOST
              Value: !GetAtt RDSInstance.Endpoint.Address
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_TABLE
              Value: !Sub '${ProjectName}'
            - Name: JWT_SECRET
              Value: !Ref JWTSecret
            - Name: CORS_WHITELIST
              Value: '*'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  AgentTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-agent'
      Cpu: !Ref AgentCpu
      Memory: !Ref AgentMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: agent
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-agent:latest'
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: PORT
              Value: '8080'
            - Name: ENV
              Value: !Ref Environment
            - Name: LLM_MODEL
              Value: !Ref LLMModel
            - Name: OPENAI_API_KEY
              Value: !Ref OpenAIApiKey
            - Name: ANTHROPIC_API_KEY
              Value: !Ref AnthropicApiKey
            - Name: PERMISSION_MODE
              Value: auto
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AgentLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: agent

  # --------------------------------------------------------------------------
  # ECS Services
  # --------------------------------------------------------------------------
  BackendService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub '${ProjectName}-backend'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Split
            - ','
            - !ImportValue DefaultVPCSubnets
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 4000
          TargetGroupArn: !Ref BackendTargetGroup

  AgentService:
    Type: AWS::ECS::Service
    DependsOn: AgentListenerRule
    Properties:
      ServiceName: !Sub '${ProjectName}-agent'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AgentTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Split
            - ','
            - !ImportValue DefaultVPCSubnets
      LoadBalancers:
        - ContainerName: agent
          ContainerPort: 8080
          TargetGroupArn: !Ref AgentTargetGroup

  # --------------------------------------------------------------------------
  # CodePipeline IAM Role
  # --------------------------------------------------------------------------
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codepipeline-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codepipeline.amazonaws.com
                - codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodePipeline_FullAccess
        - arn:aws:iam::aws:policy/AWSCodeBuildAdminAccess
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/AmazonECS_FullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  CodePipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-codepipeline-artifacts-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - ExpirationInDays: 30
            Status: Enabled

  # --------------------------------------------------------------------------
  # CodeBuild — Backend
  # --------------------------------------------------------------------------
  BackendCodeBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-backend-build'
      ServiceRole: !GetAtt CodePipelineRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO
            Value: !Sub '${ProjectName}-backend'
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - docker build -t $ECR_REPO .
                - docker tag $ECR_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
            post_build:
              commands:
                - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
                - printf '[{"name":"backend","imageUri":"%s"}]' $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest > imagedefinitions.json
          artifacts:
            files:
              - imagedefinitions.json

  # --------------------------------------------------------------------------
  # CodeBuild — Agent
  # --------------------------------------------------------------------------
  AgentCodeBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-agent-build'
      ServiceRole: !GetAtt CodePipelineRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO
            Value: !Sub '${ProjectName}-agent'
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - docker build -t $ECR_REPO .
                - docker tag $ECR_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
            post_build:
              commands:
                - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest
                - printf '[{"name":"agent","imageUri":"%s"}]' $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO:latest > imagedefinitions.json
          artifacts:
            files:
              - imagedefinitions.json

  # --------------------------------------------------------------------------
  # CodePipeline — Backend
  # --------------------------------------------------------------------------
  BackendPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${ProjectName}-backend-pipeline'
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref CodePipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub '${GitHubOwner}/${BackendRepo}'
                BranchName: !Ref GitHubBranch
              OutputArtifacts:
                - Name: SourceCode
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BackendCodeBuild
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BuildOutput
        - Name: Deploy
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: '1'
              Configuration:
                ClusterName: !Ref ECSCluster
                ServiceName: !Sub '${ProjectName}-backend'
              InputArtifacts:
                - Name: BuildOutput

  # --------------------------------------------------------------------------
  # CodePipeline — Agent
  # --------------------------------------------------------------------------
  AgentPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${ProjectName}-agent-pipeline'
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref CodePipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub '${GitHubOwner}/${AgentRepo}'
                BranchName: !Ref GitHubBranch
              OutputArtifacts:
                - Name: SourceCode
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref AgentCodeBuild
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BuildOutput
        - Name: Deploy
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: '1'
              Configuration:
                ClusterName: !Ref ECSCluster
                ServiceName: !Sub '${ProjectName}-agent'
              InputArtifacts:
                - Name: BuildOutput

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  ALBEndpoint:
    Value: !GetAtt ALB.DNSName
    Description: ALB endpoint — backend at /, agent at /agent/*

  RDSEndpoint:
    Value: !GetAtt RDSInstance.Endpoint.Address
    Description: RDS PostgreSQL endpoint

  BackendECRUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-backend'

  AgentECRUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-agent'
